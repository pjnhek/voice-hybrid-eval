# Check order status — 10 scenarios
# 3 polite, 3 frustrated, 2 upfront, 2 vague

# --- Polite / Straightforward ---

- id: check_status_001
  goal: "Check order status"
  steps:
    - user: "Hi, I was just wondering if you could tell me where my order is? I placed it a few days ago."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "Order 82714."
      bot_expect:
        contains_any: ["status", "shipped", "on its way", "delivered", "in transit", "processing"]

- id: check_status_002
  goal: "Check order status"
  steps:
    - user: "Hello, I'd like to check on the status of a recent order please."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "Yeah, the order number is 59301."
      bot_expect:
        contains_any: ["status", "shipped", "on its way", "delivered", "in transit", "processing"]

- id: check_status_003
