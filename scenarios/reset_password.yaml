# Reset account password — 10 scenarios
# 3 polite, 3 frustrated, 2 upfront, 2 vague

# --- Polite / Straightforward ---

- id: reset_password_001
  goal: "Reset account password"
  steps:
    - user: "Hi, I can't seem to log into my account. I think I need to reset my password."
      bot_expect:
        contains_any: ["email", "email address", "email on file"]
    - user: "Sure, it's jennifer.walsh@gmail.com."
      bot_expect:
        contains_any: ["reset link", "sent you a link", "password reset", "check your email"]

- id: reset_password_002
  goal: "Reset account password"
  steps:
