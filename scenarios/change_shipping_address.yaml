# Change shipping address — 10 scenarios
# 3 polite, 3 frustrated, 2 upfront, 2 vague

# --- Polite / Straightforward ---

- id: change_address_001
  goal: "Change shipping address"
  steps:
    - user: "Hi, I just realized I put the wrong shipping address on my order. Can I change it?"
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "It's order 34921."
      bot_expect:
        contains_any: ["updated your address", "address has been changed", "change confirmed", "shipping address"]

- id: change_address_002
  goal: "Change shipping address"
  steps:
    - user: "Hello, I recently moved and need to update the delivery address for a package I ordered."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "The order number is 78215."
      bot_expect:
        contains_any: ["updated your address", "address has been changed", "change confirmed", "shipping address"]

- id: change_address_003
  goal: "Change shipping address"
  steps:
    - user: "Hey, good morning. I need to change where my order gets delivered to, if that's possible."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "Sure, order 56043."
      bot_expect:
        contains_any: ["updated your address", "address has been changed", "change confirmed", "shipping address"]

# --- Frustrated / Impatient ---

- id: change_address_004
  goal: "Change shipping address"
  steps:
