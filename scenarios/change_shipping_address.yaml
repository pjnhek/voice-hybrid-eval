      bot_expect:
        contains_any: ["updated your address", "address has been changed", "change confirmed", "shipping address"]

# --- Vague / Confused ---

- id: change_address_009
  goal: "Change shipping address"
  steps:
    - user: "So um I think my package might be going to the wrong place? Like I'm not sure if I put the right address in when I ordered."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "Oh right, uh... I think it was order 21456."
