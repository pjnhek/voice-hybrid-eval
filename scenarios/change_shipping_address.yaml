    - user: "Order 91387. Please just fix it."
      bot_expect:
        contains_any: ["updated your address", "address has been changed", "change confirmed", "shipping address"]

- id: change_address_005
  goal: "Change shipping address"
  steps:
    - user: "My order is shipping to my old address and if it goes there I'm never gonna get it. I need this changed immediately."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "It's 42876. Hurry please, it's supposed to ship tomorrow."
      bot_expect:
