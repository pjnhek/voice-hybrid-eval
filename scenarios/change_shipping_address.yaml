- id: change_address_010
  goal: "Change shipping address"
  steps:
    - user: "I need to like, change something on my order? The address part. I'm not really sure how this works."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "Hmm hold on... I got it somewhere. Order 50198."
      bot_expect:
        contains_any: ["updated your address", "address has been changed", "change confirmed", "shipping address"]
