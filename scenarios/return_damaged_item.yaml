# Return a damaged item — 10 scenarios
# 3 polite, 3 frustrated, 2 upfront, 2 vague

# --- Polite / Straightforward ---

- id: return_damaged_001
  goal: "Return a damaged item"
  steps:
    - user: "Hi there, I received a product that's damaged and I'd like to return it please."
      bot_expect:
        contains_any: ["order number", "order #", "have your order", "which order"]
    - user: "Sure, it's order 48291."
      bot_expect:
        contains_any: ["initiated the return", "return created", "emailed you a label", "return label"]

