# Request refund for duplicate charge — 10 scenarios
# 3 polite, 3 frustrated, 2 upfront, 2 vague

# --- Polite / Straightforward ---

- id: duplicate_charge_001
  goal: "Request refund for duplicate charge"
  steps:
    - user: "Hi, I noticed I was charged twice for my last order. I'd like to get a refund for the extra charge please."
      bot_expect:
        contains_any: ["last four digits", "card", "last four", "card ending"]
    - user: "Sure, the card ends in 4829."
      bot_expect:
        contains_any: ["refund initiated", "processed your refund", "credit issued", "refund"]

- id: duplicate_charge_002
  goal: "Request refund for duplicate charge"
  steps:
    - user: "Hello, I'm seeing two identical charges on my statement from your store. Could you help me sort that out?"
      bot_expect:
        contains_any: ["last four digits", "card", "last four", "card ending"]
    - user: "It's the card ending in 7163."
      bot_expect:
        contains_any: ["refund initiated", "processed your refund", "credit issued", "refund"]

- id: duplicate_charge_003
