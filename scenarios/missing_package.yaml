# Report a missing package — 10 scenarios
# 3 polite, 3 frustrated, 2 upfront, 2 vague

# --- Polite / Straightforward ---

- id: missing_package_001
  goal: "Report a missing package"
  steps:
    - user: "Hi, my tracking says my package was delivered but I don't have it. I checked everywhere."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "Order 74219."
      bot_expect:
        contains_any: ["investigation", "looking into", "investigate", "opened a case", "filed a report"]

- id: missing_package_002
  goal: "Report a missing package"
  steps:
    - user: "Hello, I got a delivery notification yesterday but there's nothing at my door. Can you help me figure out what happened?"
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "It's order 38105."
      bot_expect:
        contains_any: ["investigation", "looking into", "investigate", "opened a case", "filed a report"]

- id: missing_package_003
  goal: "Report a missing package"
  steps:
    - user: "Hey, I think my package might be lost. It says delivered but I've checked the porch, the mailbox, everything."
      bot_expect:
        contains_any: ["order number", "order #", "which order"]
    - user: "Yeah, order 52847."
      bot_expect:
        contains_any: ["investigation", "looking into", "investigate", "opened a case", "filed a report"]

